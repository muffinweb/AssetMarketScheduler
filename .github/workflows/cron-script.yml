name: Daily Scheduler

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv

      - name: Test Secret
        env:
          TEST_VAR: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -z "$TEST_VAR" ]; then
            echo "❌ GitHub Secret kesinlikle BOS geliyor, ayarlardan adı kontrol et!"
          else
            echo "✅ GitHub Secret basariyla yuklendi (Icerigi guvenlik nedeniyle gorunmez)."
          fi

      - name: Run PHP Script
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SELF_JOURNAL_EMAIL_ADRESS: ${{ secrets.SELF_JOURNAL_EMAIL_ADRESS }}
        run: php bootstrap.php
